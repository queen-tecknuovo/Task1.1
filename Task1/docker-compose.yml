version: "3.8"

services:
  flask-app:
    build: .
    container_name: flask_app
    expose:
      - "5500"
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask-app
    restart: always
